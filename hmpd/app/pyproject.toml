[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.12"
files = ["hmpd_bridge", "main.py"]
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true

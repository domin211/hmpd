name: HMPD Thermostat Bridge
slug: hmpd
version: "2.3.0"
description: Expose HMPD thermostat zones to Home Assistant as MQTT climate entities
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386

startup: services
boot: auto
init: false
uart: true
homeassistant_api: true

map:
  - type: homeassistant_config
    path: /homeassistant
  - type: addon_config
    read_only: false
    path: /config

options:
  debug: false
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_discovery_prefix: homeassistant
  mqtt_base_topic: hmpd
  hmpd_path: /app/hmpd

  current_temp_sync_interval: 60
  target_sync_interval: 3600
  booking_sync_interval: 60
  auto_offset_cooldown_seconds: 60

  temp_min: 16.0
  temp_max: 32.0
  temp_step: 0.5

  booking_on_temp_default: 23.0
  booking_off_temp_default: 16.0
  external_sensor_target_offset: 2.0

  booking_status_entities: []
  external_temp_sensors: []

  controllers:
    - name: usb0
      dev: /dev/ttyUSB0
      baud: 4800
      expected_regs: 64
    - name: usb1
      dev: /dev/ttyUSB1
      baud: 4800
      expected_regs: 39

schema:
  debug: bool
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_discovery_prefix: str
  mqtt_base_topic: str
  hmpd_path: str

  current_temp_sync_interval: int(10,)
  target_sync_interval: int(60,)
  booking_sync_interval: int(10,)
  auto_offset_cooldown_seconds: int(1,)

  temp_min: float
  temp_max: float
  temp_step: float

  booking_on_temp_default: float
  booking_off_temp_default: float
  external_sensor_target_offset: float(0,)

  booking_status_entities:
    - controller: str
      zone: int(0,)
      entity_id: match(^[a-z0-9_]+\.[a-z0-9_]+$)

  external_temp_sensors:
    - controller: str
      zone: int(0,)
      entity_id: match(^[a-z0-9_]+\.[a-z0-9_]+$)

  controllers:
    - name: str
      dev: str
      baud: int(1,)
      expected_regs: int(1,)

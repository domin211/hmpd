name: HMPD Thermostat Bridge
slug: hmpd
version: "3.0.0"
description: Expose HMPD thermostat zones to Home Assistant as MQTT climate entities
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386

startup: services
boot: auto
init: false
uart: true
homeassistant_api: true

map:
  - type: homeassistant_config
    path: /homeassistant
  - type: addon_config
    read_only: false
    path: /config

options:
  debug: false
  
  # MQTT Configuration (host, port, credentials)
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  
  # HMPD Configuration
  hmpd_path: /app/hmpd
  
  # Booking Status Configuration (multiple devices per zone)
  booking_status_entities: []
  
  # External Temperature Sensors
  external_temp_sensors: []
  
  # Controller Configuration
  controllers:
    - name: usb0
      dev: /dev/ttyUSB0
      baud: 4800
      expected_regs: 64
    - name: usb1
      dev: /dev/ttyUSB1
      baud: 4800
      expected_regs: 39

schema:
  debug: bool
  
  # MQTT
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  
  # HMPD
  hmpd_path: str
  
  # Booking Status Entities (multiple zones per calendar on same controller)
  booking_status_entities:
    - name: str?
      entity_ids: ["match(^[a-z0-9_]+\\.[a-z0-9_]+$)"]
      controller: str
      zones: [int(0,)]
  
  # External Temperature Sensors
  external_temp_sensors:
    - controller: str
      zone: int(0,)
      entity_id: "match(^[a-z0-9_]+\\.[a-z0-9_]+$)"
  
  # Controllers
  controllers:
    - name: str
      dev: str
      baud: int(1,)
      expected_regs: int(1,)

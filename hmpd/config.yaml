name: HMPD Thermostat Bridge
slug: hmpd
version: "3.0.7"
description: Expose HMPD thermostat zones to Home Assistant as MQTT climate entities
arch:
  - amd64
  - aarch64

startup: services
boot: auto
init: false
uart: true
homeassistant_api: true

map:
  - type: homeassistant_config
    path: /homeassistant
  - type: addon_config
    read_only: false
    path: /config

options:
  debug: false
  
  # MQTT Configuration (host, port, credentials)
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  
  # HMPD Configuration
  hmpd_path: /app/hmpd

  # Room-based Configuration
  rooms:
    - name: room_2
      controller: usb1
      calendar: calendar.pokoj_2
      external_sensor: sensor.pokoj_2_teplota
      external_sensor_enabled: false
    - name: room_3
      controller: usb1
      calendar: calendar.pokoj_3
      external_sensor: sensor.pokoj_3_teplota
      external_sensor_enabled: false
    - name: room_4
      controller: usb1
      calendar: calendar.pokoj_4
      external_sensor: sensor.pokoj_4_teplota
      external_sensor_enabled: false
    - name: room_5
      controller: usb1
      calendar: calendar.pokoj_5
      external_sensor: sensor.pokoj_5_teplota
      external_sensor_enabled: false
    - name: room_6
      controller: usb0
      calendar: calendar.pokoj_6
      external_sensor: sensor.pokoj_6_teplota
      external_sensor_enabled: true
    - name: room_7
      controller: usb0
      calendar: calendar.pokoj_7
      external_sensor: sensor.pokoj_7_teplota
      external_sensor_enabled: true
    - name: room_8
      controller: usb0
      calendar: calendar.pokoj_8
      external_sensor: sensor.pokoj_8_teplota
      external_sensor_enabled: true
    - name: room_9
      controller: usb0
      calendar: calendar.pokoj_9
      external_sensor: sensor.pokoj_9_teplota
      external_sensor_enabled: true
    - name: room_10
      controller: usb0
      calendar: calendar.pokoj_10
      external_sensor: sensor.pokoj_10_teplota
      external_sensor_enabled: true
    - name: room_11
      controller: usb0
      calendar: calendar.pokoj_11
      external_sensor: sensor.pokoj_11_teplota
      external_sensor_enabled: true
    - name: room_12
      controller: usb0
      calendar: calendar.pokoj_12
      external_sensor: sensor.pokoj_12_teplota
      external_sensor_enabled: true
    - name: room_13
      controller: usb0
      calendar: calendar.pokoj_13
      external_sensor: sensor.pokoj_13_teplota
      external_sensor_enabled: true
    - name: room_14
      controller: usb0
      calendar: calendar.pokoj_14
      external_sensor: sensor.pokoj_14_teplota
      external_sensor_enabled: true
    - name: room_15
      controller: usb0
      calendar: calendar.pokoj_15
      external_sensor: sensor.pokoj_15_teplota
      external_sensor_enabled: true
    - name: room_16
      controller: usb0
      calendar: calendar.pokoj_16
      external_sensor: sensor.pokoj_16_teplota
      external_sensor_enabled: false
    - name: room_17
      controller: usb0
      calendar: calendar.pokoj_17
      external_sensor: sensor.pokoj_17_teplota
      external_sensor_enabled: true
    - name: room_18
      controller: usb0
      calendar: calendar.pokoj_18
      external_sensor: sensor.pokoj_18_teplota
      external_sensor_enabled: true
    - name: room_19
      controller: usb0
      calendar: calendar.pokoj_19
      external_sensor: sensor.pokoj_19_teplota
      external_sensor_enabled: false
    - name: room_20
      controller: usb0
      calendar: calendar.pokoj_20
      external_sensor: sensor.pokoj_20_teplota
      external_sensor_enabled: true
    - name: room_21
      controller: usb0
      calendar: calendar.pokoj_21
      external_sensor: sensor.pokoj_21_teplota
      external_sensor_enabled: true
    - name: room_22
      controller: usb0
      calendar: calendar.pokoj_22
      external_sensor: sensor.pokoj_22_teplota
      external_sensor_enabled: true
    - name: room_23
      controller: usb0
      calendar: calendar.pokoj_23
      external_sensor: sensor.pokoj_23_teplota
      external_sensor_enabled: true
    - name: room_24
      controller: usb0
      calendar: calendar.pokoj_24
      external_sensor: sensor.pokoj_24_teplota
      external_sensor_enabled: true
    - name: room_25
      controller: usb0
      calendar: calendar.pokoj_25
      external_sensor: sensor.pokoj_25_teplota
      external_sensor_enabled: true
  
  # Booking Status Configuration (multiple devices per zone)
  booking_on_temp_default: 23.0
  booking_off_temp_default: 16.0
  booking_status_entities: []
  
  # External Temperature Sensors
  external_temp_sensors: []
  
  # Controller Configuration
  controllers:
    - name: usb0
      dev: /dev/ttyUSB0
      baud: 4800
      expected_regs: 64
    - name: usb1
      dev: /dev/ttyUSB1
      baud: 4800
      expected_regs: 39

schema:
  debug: bool
  
  # MQTT
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  
  # HMPD
  hmpd_path: str

  # Room-based Configuration
  rooms:
    - name: str?
      controller: str
      calendar: 'match(^[a-z0-9_]+\.[a-z0-9_]+$)'
      external_sensor: str?
      external_sensor_enabled: bool
  
  # Booking Status Entities (multiple zones per calendar on same controller)
  booking_on_temp_default: float(16.0,32.0)
  booking_off_temp_default: float(16.0,32.0)
  booking_status_entities:
    - name: str?
      entity_ids: 'match(^[a-z0-9_]+\.[a-z0-9_]+(\s*,\s*[a-z0-9_]+\.[a-z0-9_]+)*$)'
      controller: str
      zones: 'match(^\s*\d+(\s*,\s*\d+)*\s*$)'
  
  # External Temperature Sensors
  external_temp_sensors:
    - controller: str
      zones: 'match(^\s*\d+(\s*,\s*\d+)*\s*$)'
      entity_id: 'match(^[a-z0-9_]+\.[a-z0-9_]+$)'
  
  # Controllers
  controllers:
    - name: str
      dev: str
      baud: int(1,)
      expected_regs: int(1,)

name: HMPD Thermostat Bridge
slug: hmpd
version: "2.1.0"
description: Expose HMPD thermostat zones to Home Assistant as MQTT climate entities
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386

startup: services
boot: auto
init: false
uart: true
homeassistant_api: true

map:
  - type: homeassistant_config
    path: /homeassistant
  - type: addon_config
    read_only: false
    path: /config

options:
  debug: false
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_discovery_prefix: homeassistant
  mqtt_base_topic: hmpd
  mqtt_client_id: hmpd_bridge
  mqtt_keepalive: 60
  mqtt_retry_seconds: 10

  current_temp_sync_interval: 60
  target_sync_interval: 3600
  auto_offset_cooldown_seconds: 60

  temps_timeout: 15
  regs_timeout: 20
  set_timeout: 20

  command_gap_seconds: 3
  max_command_attempts: 5
  retry_delays_seconds:
    - 5
    - 10
    - 60
    - 60

  temp_min: 16.0
  temp_max: 32.0
  temp_step: 0.5

  booking_sync_interval: 60
  booking_on_temp_default: 23.0
  booking_off_temp_default: 16.0

  hmpd_path: /homeassistant/hmpd
  home_assistant_api_url: http://supervisor/core/api
  home_assistant_sensor_timeout: 10

  retain_discovery: true
  retain_state: true

  booking_status_entities: []
  external_temp_sensors: []

  controllers:
    - name: usb0
      dev: /dev/ttyUSB0
      baud: 4800
      expected_regs: 64
    - name: usb1
      dev: /dev/ttyUSB1
      baud: 4800
      expected_regs: 39

schema:
  debug: bool
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_discovery_prefix: str
  mqtt_base_topic: str
  mqtt_client_id: str
  mqtt_keepalive: int(10,)
  mqtt_retry_seconds: int(1,)

  current_temp_sync_interval: int(10,)
  target_sync_interval: int(60,)
  auto_offset_cooldown_seconds: int(1,)

  temps_timeout: int(1,)
  regs_timeout: int(1,)
  set_timeout: int(1,)

  command_gap_seconds: float(0,)
  max_command_attempts: int(1,)
  retry_delays_seconds:
    - int(0,)

  temp_min: float
  temp_max: float
  temp_step: float

  booking_sync_interval: int(10,)
  booking_on_temp_default: float
  booking_off_temp_default: float

  hmpd_path: str
  home_assistant_api_url: str
  home_assistant_sensor_timeout: int(1,)

  retain_discovery: bool
  retain_state: bool

  booking_status_entities:
    - controller: str
      zone: int(0,)
      entity_id: match(^[a-z0-9_]+\.[a-z0-9_]+$)

  external_temp_sensors:
    - controller: str
      zone: int(0,)
      entity_id: match(^[a-z0-9_]+\.[a-z0-9_]+$)

  controllers:
    - name: str
      dev: str
      baud: int(1,)
      expected_regs: int(1,)
